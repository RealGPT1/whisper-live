<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Whisper Live Intent</title>

  <!-- PWA manifest & theme -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Whisper Live" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <meta name="description" content="Voice intent classification powered by Whisper. Runs entirely in your browser." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-3">

    <!-- Header -->
    <div class="app-header mb-3">
      <div>
        <h1 class="app-title">
          <i class="bi bi-mic-fill text-primary"></i>
          <span>Whisper Live Intent</span>
        </h1>
        <div class="app-status" id="status">Idle</div>
      </div>
      <button class="btn btn-success" id="toggleBtn" disabled>
        <i class="bi bi-play-fill" id="toggleIcon"></i><span class="d-none d-sm-inline ms-1" id="toggleLabel">Start</span>
      </button>
    </div>

    <!-- Audio Level Panel with State Indicators -->
    <div class="card mb-3">
      <div class="card-body py-3">
        <div class="audio-panel">
          <div class="audio-meter-wrap">
            <div class="audio-meter" id="audioMeter">
              <div class="level" id="levelBar"></div>
              <div class="threshold-marker" id="thresholdMarker"></div>
            </div>
          </div>
          <div class="state-indicators">
            <div class="state-dot speaking" id="stateSpeaking" title="Speaking">
              <i class="bi bi-mic-fill"></i>
            </div>
            <div class="state-dot processing" id="stateProcessing" title="Processing">
              <i class="bi bi-lightning-fill"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Commands -->
    <div class="card">
      <div class="card-header bg-white border-0 py-2">
        <h6 class="mb-0 small text-muted">
          <i class="bi bi-terminal me-1"></i>Commands
        </h6>
      </div>
      <div class="card-body pt-0">
        <div class="commands-scroll" id="commands">
          <div class="empty-state">
            <i class="bi bi-chat-dots d-block mb-2" style="font-size:3rem;"></i>
            <p class="mb-0 small">Speak a command to get started</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Floating dark mode toggle -->
  <button class="fab-theme" id="darkModeBtn" title="Toggle dark mode">
    <i class="bi bi-moon-fill" id="darkModeIcon"></i>
  </button>

  <script type="module" src="app.js"></script>

  <!-- SW update notification -->
  <div id="pwa-update-toast" style="
    display:none; position:fixed; top:1rem; left:50%; transform:translateX(-50%);
    z-index:9999; background:#0d6efd; color:#fff; border-radius:12px;
    padding:.65rem 1.1rem; font-size:.82rem; box-shadow:0 4px 20px rgba(13,110,253,.4);
    align-items:center; gap:.6rem; cursor:pointer; white-space:nowrap;"
    role="status" aria-live="polite">
    <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
    Update available — tap to reload
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).then((reg) => {
        const toast = document.getElementById('pwa-update-toast');
        const showToast = (sw) => {
          toast.style.display = 'flex';
          toast.addEventListener('click', () => sw.postMessage({ type: 'SKIP_WAITING' }), { once: true });
        };
        if (reg.waiting) showToast(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw?.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) showToast(nw);
          });
        });
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) { refreshing = true; location.reload(); }
        });
      }).catch((e) => console.warn('SW:', e));
    }
  </script>
</body>
</html>
