<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Whisper Live Dictate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-3">

    <!-- Header -->
    <div class="app-header mb-3">
      <div>
        <h1 class="app-title" id="appTitle" title="Click for transcript options">
          <i class="bi bi-list me-1" id="hamburgerIcon"></i><span>Whisper Live Dictate</span>
          <i class="bi bi-mic-mute-fill text-primary" id="titleMicIcon"></i>
        </h1>
        <div class="app-status" id="status">Idle</div>
      </div>
      <button class="btn btn-success" id="toggleBtn" disabled>
        <i class="bi bi-play-fill" id="toggleIcon"></i><span class="d-none d-sm-inline ms-1" id="toggleLabel">Start</span>
      </button>
    </div>

    <!-- Audio Level Panel with State Indicators -->
    <div class="card mb-3">
      <div class="card-body py-3">
        <div class="audio-panel">
          <div class="audio-meter-wrap">
            <div class="audio-meter" id="audioMeter">
              <div class="level" id="levelBar"></div>
              <div class="threshold-marker" id="thresholdMarker"></div>
            </div>
          </div>
          <div class="state-indicators">
            <div class="state-dot speaking" id="stateSpeaking" title="Speaking">
              <i class="bi bi-mic-fill"></i>
            </div>
            <div class="state-dot processing" id="stateProcessing" title="Processing">
              <i class="bi bi-lightning-fill"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Transcription -->
    <div class="card">
      <div class="card-header border-0 py-2">
        <div class="d-flex align-items-center justify-content-between">
          <h6 class="mb-0 small text-muted">
            <i class="bi bi-card-text me-1"></i>Transcription
          </h6>
          <button class="copy-all-btn" id="copyAllBtn" title="Copy all to clipboard">
            <i class="bi bi-clipboard" id="copyAllIcon"></i>
          </button>
        </div>
      </div>
      <div class="card-body pt-0">
        <div class="dictations-scroll" id="dictations">
          <div class="empty-state">
            <i class="bi bi-mic d-block mb-2" style="font-size:3rem;"></i>
            <p class="mb-0 small">Speak to start transcribing</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Floating dark mode toggle -->
  <button class="fab-theme" id="darkModeBtn" title="Toggle dark mode">
    <i class="bi bi-moon-fill" id="darkModeIcon"></i>
  </button>

  <!-- Title Options Modal -->
  <div class="modal fade" id="titleModal" tabindex="-1" aria-labelledby="titleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-1">
          <h5 class="modal-title" id="titleModalLabel">
            <i class="bi bi-mic-fill text-primary me-2"></i>Whisper Live Dictate
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-2">
          <p class="text-muted small mb-3">What would you like to do with your transcript?</p>
          <div class="d-grid gap-2">
            <button class="btn btn-outline-primary modal-action-btn" id="modalCopyBtn">
              <i class="bi bi-clipboard me-2"></i>Copy transcript to clipboard
            </button>
            <div class="save-file-group">
              <div class="input-group input-group-sm mb-1">
                <span class="input-group-text"><i class="bi bi-file-text"></i></span>
                <input type="text" class="form-control" id="saveFilename" placeholder="filename.txt">
              </div>
              <button class="btn btn-outline-secondary modal-action-btn w-100" id="modalSaveBtn">
                <i class="bi bi-download me-2"></i>Save as text file
              </button>
            </div>
            <button class="btn btn-outline-danger modal-action-btn" id="modalNewBtn">
              <i class="bi bi-arrow-counterclockwise me-2"></i>Start new transcript
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transcript Item Edit Modal -->
  <div class="modal fade" id="itemModal" tabindex="-1" aria-labelledby="itemModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-1">
          <h5 class="modal-title" id="itemModalLabel">
            <i class="bi bi-pencil-square text-primary me-2"></i>Edit Transcript
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-2">
          <textarea class="form-control" id="itemModalText" rows="6" style="resize:vertical;"></textarea>
        </div>
        <div class="modal-footer border-0 pt-1">
          <button class="btn btn-outline-secondary" id="itemModalCancelBtn">
            <i class="bi bi-x-lg me-1"></i>Cancel
          </button>
          <button class="btn btn-outline-primary" id="itemModalCopyBtn">
            <i class="bi bi-clipboard me-1" id="itemModalCopyIcon"></i>Copy
          </button>
          <button class="btn btn-primary" id="itemModalUpdateBtn">
            <i class="bi bi-check-lg me-1"></i>Update
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
