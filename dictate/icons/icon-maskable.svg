<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>
  <!-- Full square background (maskable - fills entire canvas) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!--
    Safe zone for maskable icons: inner 80% (10% margin each side).
    For 512×512 that is the region from (51,51) to (461,461).
    All visible content is kept inside this area.
  -->
  <!-- Microphone capsule — scaled to sit in safe zone -->
  <rect x="210" y="128" width="92" height="152" rx="46" fill="white"/>
  <!-- Stand arc -->
  <path d="M166 264 Q166 348 256 348 Q346 348 346 264"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Pole -->
  <line x1="256" y1="348" x2="256" y2="392" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="204" y1="392" x2="308" y2="392" stroke="white" stroke-width="22" stroke-linecap="round"/>
</svg>
